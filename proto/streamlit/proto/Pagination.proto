syntax = "proto3";

message Pagination {
  string id = 1;
  uint32 num_pages = 2;
  uint32 default = 3;
  optional uint32 max_visible_pages = 4;
  bool disabled = 5;
  string form_id = 6;
  uint32 value = 7;
  bool set_value = 8;
  optional string query_param_key = 9;
  // next id: 10
}
